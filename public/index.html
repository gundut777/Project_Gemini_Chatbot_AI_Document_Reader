<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gemini AI Chatbot</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="chatbot-container">
        <header>
            <div class="header-content">
                <div class="bot-avatar">
                    <svg viewBox="0 0 24 24" width="30" height="30" fill="white">
                        <path d="M12 2c5.52 0 10 4.48 10 10s-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2zm0 2c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3z"></path>
                    </svg>
                </div>
                <div class="header-text">
                    <h1>Gemini AI Assistant</h1>
                    <div class="online-status">
                        <span class="dot"></span> Online
                    </div>
                </div>
            </div>
        </header>

        <section class="upload-section">
            <div class="section-title">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="#007bff">
                    <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"></path>
                </svg>
                Analisis Dokumen PDF
            </div>
            <div class="upload-controls">
                <label for="pdf-input" class="custom-file-upload">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"></path>
                    </svg>
                    Pilih File
                </label>
                <input type="file" id="pdf-input" accept="application/pdf">
                <span id="file-name">Pilih laporan (.pdf)</span>
                <button id="upload-btn" class="upload-action-btn">Mulai Analisa</button>
            </div>
            <div id="upload-status" class="status-indicator"></div>
        </section>

        <div id="chat-box" class="chat-box">
            <div class="message bot">
                <div class="message-content">
                    Halo! Saya asisten AI Anda. Silakan unggah laporan PDF sistem di atas, dan saya akan membantu Anda menganalisis datanya secara akurat.
                </div>
                <div class="message-time">Baru saja</div>
            </div>
        </div>

        <div class="typing-indicator" id="typing-indicator" style="display: none;">
            <span></span><span></span><span></span>
        </div>

        <form id="chat-form" class="chat-form">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Tanyakan sesuatu tentang laporan..." autocomplete="off" required>
                <button type="submit" class="btn-send">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
